<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSeats - Seat Selection</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1>CineSeats</h1>
        <p>Select Your Seats</p>
    </header>

    <main>
        <div style="text-align: center; margin-bottom: 1rem;">
            <h2 id="sessionInfo">Loading session...</h2>
        </div>
        
        <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 1rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem;"><div class="seat available" style="width:20px;height:20px;cursor:default;"></div> Available</div>
            <div style="display: flex; align-items: center; gap: 0.5rem;"><div class="seat selected" style="width:20px;height:20px;cursor:default;"></div> Selected</div>
            <div style="display: flex; align-items: center; gap: 0.5rem;"><div class="seat reserved" style="width:20px;height:20px;cursor:default;"></div> Reserved</div>
            <div style="display: flex; align-items: center; gap: 0.5rem;"><div class="seat sold" style="width:20px;height:20px;cursor:default;"></div> Sold</div>
        </div>

        <div id="seatsContainer" class="seat-grid">
            <!-- Seats will be rendered here by JS -->
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <button id="btnContinue" class="btn-primary" disabled>Continue to Checkout</button>
            <br><br>
            <a href="../index.html" style="color: var(--text-color);">Back to Movies</a>
        </div>
    </main>

    <script type="module" src="../app.js"></script>
</body>
</html>
