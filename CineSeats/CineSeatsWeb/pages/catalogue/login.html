<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSeats Admin - Login</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f0f0f0;">
    
    <div class="card" style="width: 100%; max-width: 400px; background-color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; margin-bottom: 2rem;">Admin Login</h2>
        
        <div id="login-error" class="alert alert-error hidden"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-control" value="admin@cineseats.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" value="admin" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        <div style="text-align: center; margin-top: 1rem;">
            <a href="../../index.html" style="color: var(--color-secondary); text-decoration: none; font-size: 0.9rem;">Back to Customer Portal</a>
        </div>
    </div>

    <script type="module" src="../../js/ui/catalogueManager.js"></script>
</body>
</html>
