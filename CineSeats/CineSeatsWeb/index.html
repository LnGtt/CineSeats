<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSeats - Select a Movie</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="container">
            <a href="index.html">CineSeats</a>
            <a href="./pages/catalogue/login.html" class="btn btn-outline" style="color: white; border-color: white;">Admin Login</a>
        </div>
    </header>

    <main class="container">
        <h1>Now Playing</h1>
        
        <div id="error-container" class="alert alert-error hidden"></div>
        
        <div id="movies-loading">Loading movies...</div>
        
        <div id="movies-container" class="hidden">
            <!-- Movie cards will be rendered here -->
        </div>

        <div id="sessions-section" class="hidden">
            <h2 id="selected-movie-title"></h2>
            <button id="btn-back-movies" class="btn btn-outline">Back to Movies</button>
            <div id="sessions-container" style="margin-top: 1rem;">
                <!-- Session list will be rendered here -->
            </div>
        </div>
    </main>

    <!-- Specific styles for index -->
    <style>
        #movies-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }
        .movie-card {
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .movie-card:hover {
            border-color: var(--color-primary);
        }
        .session-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border: 1px solid var(--color-border);
            margin-bottom: 0.5rem;
            border-radius: var(--border-radius);
            background-color: var(--color-surface);
        }
    </style>

    <script type="module" src="./js/ui/domManager.js"></script>
</body>
</html>
